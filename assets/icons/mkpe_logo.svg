<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" fill="#0A0A0A"/>
  <polygon points="128,12 232,70 232,186 128,244 24,186 24,70"
           fill="url(#armorBody)" stroke="url(#bevelEdge)" stroke-width="8"/>
  <polygon points="128,36 210,84 210,172 128,220 46,172 46,84"
           fill="url(#innerPlate)" stroke="#0C0C0C" stroke-width="2"/>
  <polygon points="128,28 220,78 220,178 128,228 36,178 36,78"
           fill="none" stroke="url(#rimLight)" stroke-width="4" opacity="0.6"/>

  <!-- Concentric protection rings -->
  <circle cx="128" cy="132" r="16" fill="none" stroke="url(#ring1)" stroke-width="4" opacity="0.8"/>
  <circle cx="128" cy="132" r="34" fill="none" stroke="url(#ring2)" stroke-width="3" opacity="0.6"/>
  <circle cx="128" cy="132" r="52" fill="none" stroke="url(#ring3)" stroke-width="2" opacity="0.4"/>
  <circle cx="128" cy="132" r="8" fill="url(#coreGlow)"/>

  <defs>
    <linearGradient id="armorBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#555"/><stop offset="30%" stop-color="#2A2A2A"/><stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="bevelEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0E0E0"/><stop offset="100%" stop-color="#404040"/>
    </linearGradient>
    <linearGradient id="innerPlate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/><stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <linearGradient id="rimLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00CFFF"/><stop offset="100%" stop-color="#007ACC"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF"/><stop offset="100%" stop-color="#005588"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00CFFF"/><stop offset="100%" stop-color="#003366"/>
    </linearGradient>
    <linearGradient id="ring3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0088CC"/><stop offset="100%" stop-color="#001122"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FFFF"/><stop offset="100%" stop-color="#004488"/>
    </radialGradient>
  </defs>
</svg>



