# MKPE Release Workflow -- Phase 1.6 SCAFFOLD
#
# Status: Phase 1.6 (producer integrated, ephemeral key signing).
# Target: SLSA Build Level 2-ish today; Phase 2 hardens this to L3.
#
# WHAT THIS WORKFLOW DOES TODAY (Phase 1.6)
# -----------------------------------------
# 1. Builds MKPE on a GitHub-hosted Ubuntu runner.
# 2. Cross-compiles to `x86_64-pc-windows-msvc` via `cargo-xwin`.
# 3. Generates an ephemeral ed25519 key inside the run.
# 4. Composes a `BuildContextSpec` JSON from GitHub Actions context.
# 5. Invokes `mkpe build-attestation` to emit a real, signed DSSE envelope.
# 6. Uploads artifact + envelope + pubkey as workflow artifacts.
#
# WHAT THIS WORKFLOW DOES NOT YET DO (Phase 2 scope)
# --------------------------------------------------
# - Sigstore-keyless signing (Fulcio cert as `builder.id`). Today the
#   `builder.id` is the workflow ref, not a verifiable identity certificate.
# - Runner image SHA-256 pinning. GitHub-hosted runners change underneath
#   us; SLSA L3 wants a content-addressed runner image.
# - Reproducibility verification (build twice on two runners, byte-compare).
# - Publishing to a release page / cosign attest / Rekor logging.
# - Branch-protected workflow file (workflow ref pinning).
#
# DO NOT CONFUSE THIS WITH AN SLSA L3 WORKFLOW. The format of the
# attestation is L3-compatible; the trust chain that produces it is not.

name: release

on:
  # Manual dispatch only until Phase 2 locks the trust chain. Auto-running
  # this on push would imply L3-grade trust we don't yet have.
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or branch to build (e.g. refs/tags/v1.1.0)"
        required: true
        type: string

# Least-privilege defaults. Individual jobs opt into more if needed.
permissions:
  contents: read

# Cancel an in-flight run if a newer one starts for the same ref. Prevents
# two builds racing to publish the same artifact.
concurrency:
  group: release-${{ github.event.inputs.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows x86_64 attestation (Phase 1.6 scaffold)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    # Surface to the user that this is not yet L3. Cosmetic but reinforces
    # the README warning every time CI runs.
    env:
      MKPE_SLSA_LEVEL: "L2-scaffold (Phase 1.6)"
      TARGET: x86_64-pc-windows-msvc
      PROFILE: dist

    steps:
      # SHA-pinned versions only. Tag-based references (`@v4`) are NOT
      # tamper-evident -- a maintainer could move the tag. SHAs are
      # content-addressed.
      - name: Checkout sources
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
        with:
          ref: ${{ github.event.inputs.ref }}
          # `fetch-depth: 0` so we can resolve the exact commit SHA below.
          fetch-depth: 0

      - name: Capture start time
        id: started
        run: |
          echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # The toolchain version is pinned in rust-toolchain.toml; rustup
      # honors it automatically. We re-print it here so the workflow log
      # shows the resolved version next to its expected value.
      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        run: |
          rustup show active-toolchain
          rustup target add "$TARGET"

      - name: Install cargo-xwin
        run: cargo install cargo-xwin --version 0.18.0 --locked

      # cargo-xwin needs LLVM. clang version is captured into the
      # attestation as part of the cross-compiler evidence block.
      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld

      - name: Capture tool versions
        id: tools
        run: |
          echo "rustc_version=$(rustc -V)" >> "$GITHUB_OUTPUT"
          echo "rustc_host=$(rustc -vV | sed -n 's/^host: //p')" >> "$GITHUB_OUTPUT"
          echo "rustc_commit=$(rustc -vV | sed -n 's/^commit-hash: //p')" >> "$GITHUB_OUTPUT"
          echo "cargo_version=$(cargo -V)" >> "$GITHUB_OUTPUT"
          echo "xwin_version=$(cargo xwin --version 2>&1 | head -1)" >> "$GITHUB_OUTPUT"
          echo "clang_version=$(clang --version | head -1)" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        run: |
          cargo xwin build --release --target "$TARGET" \
            -p mkpe \
            -p morse_kirby_core

      # Stage the artifact under a stable name. The subject digest in the
      # attestation is the SHA-256 of *this* file, so its name and bytes
      # are now load-bearing.
      - name: Stage primary artifact
        id: stage
        run: |
          mkdir -p dist
          cp "target/$TARGET/release/mkpe.exe" "dist/mkpe-${{ github.event.inputs.ref }}-$TARGET.exe"
          echo "artifact_path=dist/mkpe-${{ github.event.inputs.ref }}-$TARGET.exe" >> "$GITHUB_OUTPUT"
          echo "artifact_name=mkpe-${{ github.event.inputs.ref }}-$TARGET.exe" >> "$GITHUB_OUTPUT"

      # Phase 1.6: ephemeral key per run. This is NOT L3; Phase 2 swaps
      # this for Sigstore-keyless. Until then the public key is published
      # alongside the artifact so external verifiers can use it.
      - name: Generate ephemeral signing key for this run
        run: |
          ./target/$TARGET/release/mkpe.exe keygen --output ./signing-keys \
            || cargo run --release -p mkpe -- keygen --output ./signing-keys

      - name: Compose BuildContextSpec from GitHub context
        id: context
        run: |
          cat > build_context.json <<EOF
          {
            "source_uri": "git+https://github.com/${{ github.repository }}@${{ steps.started.outputs.commit }}",
            "source_ref": "${{ github.event.inputs.ref }}",
            "target": "$TARGET",
            "profile": "$PROFILE",
            "workflow": {
              "path": ".github/workflows/release.yml",
              "ref": "${{ github.sha }}"
            },
            "rust_toolchain": {
              "channel": "$(rustc -V | awk '{print $2}')",
              "host": "${{ steps.tools.outputs.rustc_host }}",
              "rustcCommit": "${{ steps.tools.outputs.rustc_commit }}"
            },
            "runner": {
              "os": "ubuntu-24.04",
              "arch": "x86_64",
              "image": "ghcr.io/actions/runner-images/ubuntu-24.04:unpinned-phase1.6"
            },
            "cross_compiler": {
              "tool": "cargo-xwin",
              "toolVersion": "0.18.0",
              "msvcSdkSha256": "$(echo -n 'phase1.6-not-yet-pinned' | sha256sum | awk '{print $1}')",
              "clangVersion": "${{ steps.tools.outputs.clang_version }}"
            },
            "builder_id": "https://github.com/${{ github.repository }}/.github/workflows/release.yml@${{ github.event.inputs.ref }}",
            "builder_versions": {
              "cargo": "$(cargo -V | awk '{print $2}')",
              "rustc": "$(rustc -V | awk '{print $2}')",
              "cargo-xwin": "0.18.0"
            },
            "invocation_id": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "started_on": "${{ steps.started.outputs.ts }}",
            "finished_on": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat build_context.json

      - name: Produce DSSE attestation
        run: |
          cargo run --release -p mkpe -- build-attestation \
            --artifact "${{ steps.stage.outputs.artifact_path }}" \
            --lockfile Cargo.lock \
            --context build_context.json \
            --key ./signing-keys/mkpe_private.key \
            --output "${{ steps.stage.outputs.artifact_path }}.intoto.jsonl"

      # Self-check: the workflow must verify what it just produced before
      # uploading. If this step fails, the attestation is broken; the run
      # should not silently publish unverifiable artifacts.
      - name: Self-verify attestation
        run: |
          cargo run --release -p mkpe -- verify-attestation \
            "${{ steps.stage.outputs.artifact_path }}.intoto.jsonl" \
            --pubkey ./signing-keys/mkpe_public.key \
            --artifact "${{ steps.stage.outputs.artifact_path }}" \
            --json

      # Phase 1.6: publish artifact + envelope + public key. The public
      # key is a workflow artifact (not committed), so verifiers must
      # trust the workflow run identity. Phase 2 swaps this for
      # Sigstore-keyless where trust is rooted in Fulcio + Rekor.
      - name: Upload artifact + attestation + pubkey
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: mkpe-${{ github.event.inputs.ref }}-${{ env.TARGET }}-phase1.6
          path: |
            ${{ steps.stage.outputs.artifact_path }}
            ${{ steps.stage.outputs.artifact_path }}.intoto.jsonl
            ./signing-keys/mkpe_public.key
          retention-days: 90
          if-no-files-found: error
